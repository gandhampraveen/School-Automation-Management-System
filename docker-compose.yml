services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: sqlite:///school_automation.db
      JWT_SECRET_KEY: change-me-in-production

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
