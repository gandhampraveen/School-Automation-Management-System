databases:
  - name: school-automation-db

services:
  - type: web
    name: school-automation-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-automation-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

  - type: web
    name: school-automation-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: school-automation-backend
          type: web
          property: host
      - key: BACKEND_PORT
        fromService:
          name: school-automation-backend
          type: web
          property: port