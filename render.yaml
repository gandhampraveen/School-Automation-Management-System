databases:
  - name: school-automation-db

services:
  - type: web
    name: school-automation-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-automation-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

  - type: web
    name: school-automation-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://school-automation-backend.onrender.com/api